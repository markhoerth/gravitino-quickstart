# Gravitino server config
gravitino.server.webserver.host = 0.0.0.0
gravitino.server.webserver.httpPort = 8090

# Use PostgreSQL as entity store instead of H2
gravitino.entity.store = kv
gravitino.entity.store.kv = RocksDB
gravitino.entity.store.rocksdb.path = /gravitino/data/rocksdb

# Uncomment below to use PostgreSQL as entity store (requires additional setup)
# gravitino.entity.store = relational
# gravitino.entity.store.relational.jdbcUrl = jdbc:postgresql://postgres:5432/gravitino_meta
# gravitino.entity.store.relational.jdbcUser = gravitino
# gravitino.entity.store.relational.jdbcPassword = gravitino
# gravitino.entity.store.relational.jdbcDriver = org.postgresql.Driver
