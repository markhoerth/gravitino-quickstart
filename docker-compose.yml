name: gravitino-quickstart

x-postgres-common: &postgres-common
  image: postgres:15
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 5s
    timeout: 5s
    retries: 10

services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    <<: *postgres-common
    container_name: gqs-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - gqsnet


  # ─── MinIO (S3-compatible object storage for Iceberg) ─────────
  minio:
    image: minio/minio:latest
    container_name: gqs-minio
    environment:
      MINIO_ROOT_USER: gravitino
      MINIO_ROOT_PASSWORD: gravitino123
    ports:
      - "9000:9000"
      - "9002:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gqsnet

  # ─── LakeFS (Git for data, backed by MinIO) ───────────────────
  lakefs:
    image: treeverse/lakefs:latest
    container_name: gqs-lakefs
    command: run
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - LAKEFS_BLOCKSTORE_TYPE=s3
      - LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE=true
      - LAKEFS_BLOCKSTORE_S3_ENDPOINT=http://gqs-minio:9000
      - LAKEFS_BLOCKSTORE_S3_DISCOVER_BUCKET_REGION=false
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID=gravitino
      - LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY=gravitino123
      - LAKEFS_AUTH_ENCRYPT_SECRET_KEY=gravitino-quickstart-secret
      - LAKEFS_INSTALLATION_USER_NAME=gravitino
      - LAKEFS_INSTALLATION_ACCESS_KEY_ID=gravitino-lakefs-key
      - LAKEFS_INSTALLATION_SECRET_ACCESS_KEY=gravitino-lakefs-secret
      - LAKEFS_DATABASE_TYPE=local
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/api/v1/healthcheck || exit 1" ] 
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gqsnet

  # ─── Gravitino Iceberg REST Catalog (standalone IRC) ──────────
  irc:
    build: ./irc
    container_name: gqs-irc
    environment:
      GRAVITINO_CATALOG_BACKEND: jdbc
      GRAVITINO_URI: jdbc:postgresql://postgres:5432/iceberg_catalog
      GRAVITINO_JDBC_DRIVER: org.postgresql.Driver
      GRAVITINO_JDBC_USER: gravitino
      GRAVITINO_JDBC_PASSWORD: gravitino
      GRAVITINO_WAREHOUSE: file:///tmp/iceberg-warehouse
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9003:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9001/iceberg/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gqsnet

  # ─── Gravitino ────────────────────────────────────────────────
  gravitino:
    build: ./gravitino
    container_name: gqs-gravitino
    environment:
      AWS_ACCESS_KEY_ID: gravitino
      AWS_SECRET_ACCESS_KEY: gravitino123
      AWS_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      irc:
        condition: service_healthy
    ports:
      - "8090:8090"
      - "9001:9001"
    volumes:
      - gravitino_data:/gravitino/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/api/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gqsnet

  # ─── Hive Metastore ───────────────────────────────────────────
  hms:
    build: ./hms
    container_name: gqs-hms
    depends_on:
      postgres:
        condition: service_healthy
      lakefs: 
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
    ports:
      - "9083:9083"
    volumes:
      - hive_data:/data/hive
      - nyc_taxi_data:/data/nyc_taxi
    networks:
      - gqsnet

  # ─── Trino ────────────────────────────────────────────────────
  trino:
    build: ./trino
    container_name: gqs-trino
    environment:
      AWS_ACCESS_KEY_ID: gravitino
      AWS_SECRET_ACCESS_KEY: gravitino123
      AWS_REGION: us-east-1
    depends_on:
      gravitino:
        condition: service_healthy
    volumes:
      - nyc_taxi_data:/data/nyc_taxi
    ports:
      - "8082:8082"
    networks:
      - gqsnet

  # ─── CloudBeaver ──────────────────────────────────────────────
  cloudbeaver:
    build: ./cloudbeaver
    container_name: gqs-cloudbeaver
    environment:
      CB_SERVER_NAME: "Gravitino Quickstart"
      CB_SERVER_URL: "http://localhost:8978"
      CB_ADMIN_NAME: "cbadmin"
      CB_ADMIN_PASSWORD: "Admin1234"
    depends_on:
      - trino
    ports:
      - "8978:8978"
    networks:
      - gqsnet

  # ─── Airflow ──────────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.0
    container_name: gqs-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow_meta
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: gravitino-quickstart
    command: db init
    networks:
      - gqsnet

  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: gqs-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8083:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow_meta
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: gravitino-quickstart
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: webserver
    networks:
      - gqsnet

  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: gqs-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres/airflow_meta
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: gravitino-quickstart
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: scheduler
    networks:
      - gqsnet

  # ─── Init ─────────────────────────────────────────────────────
  init:
    build: ./init
    container_name: gqs-init
    depends_on:
      gravitino:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      irc:
        condition: service_healthy
      lakefs: 
        condition: service_healthy
    volumes:
      - nyc_taxi_data:/data/nyc_taxi
      - hive_data:/data/hive
    networks:
      - gqsnet

  spark-sql:
    build: ./spark-sql
    container_name: gqs-spark-sql
    entrypoint: ["/opt/spark/bin/start-spark-sql.sh"]
    stdin_open: true
    tty: true
    volumes:
      - ./spark_test_queries.sql:/home/spark_test_queries.sql:ro
    depends_on:
      gravitino:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks:
      - gqsnet

networks:
  gqsnet:
    name: gqsnet
    driver: bridge

volumes:
  postgres_data:
  gravitino_data:
  hive_data:
  derby_data:
  cloudbeaver_data:
  nyc_taxi_data:
