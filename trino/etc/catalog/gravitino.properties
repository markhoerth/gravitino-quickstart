connector.name=gravitino

# Gravitino server - use service name since we're in docker-compose network
gravitino.uri=http://gravitino:8090
gravitino.metalake=demo
gravitino.catalog.cache-eviction-interval-ms=60000



# S3/MinIO configuration for Iceberg writes
hive.s3.endpoint=http://gqs-minio:9000
hive.s3.path-style-access=true
hive.s3.aws-access-key=gravitino
hive.s3.aws-secret-key=gravitino123
hive.s3.ssl.enabled=false
